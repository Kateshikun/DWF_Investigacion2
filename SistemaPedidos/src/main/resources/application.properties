# 1. Config de la App
spring.application.name=SistemaPedidos

# 2. Config de RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# 3. Config de Base de Datos (H2 en Memoria)
spring.datasource.url=jdbc:h2:mem:pedidosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite ver la consola de H2
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# 4. Mostrar los logs de SQL en la consola
spring.jpa.show-sql=true

# 5. Config de serializacion para RabbitMQ
spring.rabbitmq.template.allowed-list-packages=sv.edu.udb.sistemapedidos.model
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# 6. Actuator para Kubernetes health probes
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true