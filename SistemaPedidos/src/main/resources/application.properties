# 1. Configuración de la Aplicación
spring.application.name=SistemaPedidos

# 2. Configuración de RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 3. Configuración de Base de Datos (H2 en Memoria)
spring.datasource.url=jdbc:h2:mem:pedidosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite ver la consola de H2
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# 4. Mostrar los logs de SQL en la consola
spring.jpa.show-sql=true
spring.rabbitmq.template.allowed-list-packages=sv.edu.udb.sistemapedidos.dto.*
