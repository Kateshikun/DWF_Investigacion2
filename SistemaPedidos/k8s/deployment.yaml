apiVersion: apps/v1
kind: Deployment
metadata:
  name: sistemapedidos-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sistemapedidos
  template:
    metadata:
      labels:
        app: sistemapedidos
    spec:
      containers:
        - name: sistemapedidos
          image: sistemapedidos:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sistemapedidos-config
            - secretRef:
                name: sistemapedidos-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3